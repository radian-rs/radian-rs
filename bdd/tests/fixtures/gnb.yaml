# free-ran-ue gNB for the radian e2e datapath test.
# Runs in the RAN namespace; N2/N3 to the core (host 10.0.1.1), RAN planes open to the UE.
gnb:
  amfN2Ip: "10.0.1.1"
  ranN2Ip: "10.0.1.2"
  upfN3Ip: "10.0.1.1"
  ranN3Ip: "10.0.1.2"

  ranControlPlaneIp: "10.0.2.1"
  ranDataPlaneIp: "10.0.2.1"

  amfN2Port: 38412
  ranN2Port: 38413
  upfN3Port: 2152
  ranN3Port: 2152

  ranControlPlanePort: 31413
  ranDataPlanePort: 31414

  gnbId: "000314"
  gnbName: "gNB"

  # The gNB's broadcast PLMN; the radian AMF does not enforce it against the UE.
  plmnId:
    mcc: "208"
    mnc: "93"

  tai:
    tac: "000001"
    broadcastPlmnId:
      mcc: "208"
      mnc: "93"

  snssai:
    sst: "1"
    sd: "010203"

  api:
    ip: "10.0.1.2"
    port: 40104

logger:
  level: "info"
