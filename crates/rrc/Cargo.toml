[package]
name = "rrc"
version.workspace = true
edition.workspace = true
authors.workspace = true

# RRC — Radio Resource Control (TS 38.331), the Uu control protocol between the UE
# and the gNB. Wire encoding is ASN.1 UPER. The codec in `src/generated.rs` is
# generated by Hampi's `rs-asn1c` from `asn/rrc.asn` (a pinned TS 38.331 module) —
# see README.md for provenance and the regeneration command (design/129 chose Hampi
# after a golden-PDU spike). This crate adds hand-written builders/parsers for the
# gNB/UE message subset, mirroring how `crates/ngap` wraps its generated NGAP codec.

[dependencies]
# The generated codec's runtime + derive macros (Hampi). Pinned: the checked-in
# generated file targets exactly these versions.
asn1-codecs = "0.7.2"
asn1_codecs_derive = "0.7.2"
bitvec = "1"
log = "0.4"
