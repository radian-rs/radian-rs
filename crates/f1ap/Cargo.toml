[package]
name = "f1ap"
version.workspace = true
edition.workspace = true
authors.workspace = true

# F1AP — F1 Application Protocol (TS 38.473), the CU↔DU control protocol on the F1
# interface. Wire encoding is ASN.1 **APER** (like NGAP, unlike RRC's UPER). The codec in
# `src/generated.rs` is generated by Hampi's `rs-asn1c` from `asn/*.asn` (the vendored,
# pinned TS 38.473 modules) — see README.md for provenance and the regeneration command
# (design/128 Phase 3, the interop rung: a Rust CU ↔ OCUDU `odu`). This crate adds
# hand-written builders/parsers for the F1 message subset, mirroring `crates/ngap` and
# `crates/rrc`. RRC rides opaque inside F1AP (RRCContainer = OCTET STRING).

[dependencies]
# The generated codec's runtime + derive macros (Hampi), pinned to the checked-in output.
asn1-codecs = "0.7.2"
asn1_codecs_derive = "0.7.2"
bitvec = "1"
log = "0.4"
